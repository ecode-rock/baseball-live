name: Scrape Live Game

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:
    inputs:
      game_pk:
        description: "Baseball Savant game_pk (overrides GAME_PK secret)"
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          # Manual dispatch input takes priority over the repo secret
          GAME_PK: ${{ github.event.inputs.game_pk || secrets.GAME_PK }}
        run: python scraper/scraper.py

      - name: Commit and push data.csv if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.csv
          if git diff --cached --quiet; then
            echo "No changes to data.csv — skipping commit."
          else
            git commit -m "scrape: update data.csv $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
